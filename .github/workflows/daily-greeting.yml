name: Daily Claude Greeting

on:
  # Temporarily disable scheduled runs.
  # To re-enable, restore the `schedule` block and its cron entries.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write
  actions: read

jobs:
  greet-claude:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "hi"
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 1"
